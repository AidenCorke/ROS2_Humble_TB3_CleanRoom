amcl:
  ros__parameters:
    use_sim_time: true
    alpha1: 0.05
    alpha2: 0.05
    alpha3: 0.05
    alpha4: 0.05
    alpha5: 0.05
    base_frame_id: base_footprint
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: map
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 100.0
    laser_min_range: -1.0
    laser_model_type: likelihood_field
    max_beams: 60
    max_particles: 500        # Optimized for simulation
    min_particles: 100
    odom_frame_id: odom
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: nav2_amcl::DifferentialMotionModel
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 1.5
    update_min_a: 0.3
    update_min_d: 0.25         # Updated for tighter house movement
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    scan_topic: scan
    set_initial_pose: true
    always_reset_initial_pose: true
    initial_pose: # Set initial pose
      x: -2.0
      y: 0.5
      z: 0.0
      yaw: 0.0  

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    #default_nav_to_pose_bt_xml: "/home/vincent2647/ros2_ws/src/go_to_room/config/navigate_to_pose.xml"
    #default_nav_through_poses_bt_xml: "/home/vincent2647/ros2_ws/src/go_to_room/config/navigate_to_pose.xml"
    #default_waypoint_bt_xml: "/home/vincent2647/ros2_ws/src/go_to_room/config/navigate_to_pose.xml"
    navigators:
      - navigate_to_pose
      - navigate_through_poses
      - waypoints_navigator
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    waypoints_navigator:
      plugin: "nav2_bt_navigator::WaypointsNavigator"
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_distance_controller_bt_node
      - nav2_rate_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_round_robin_node_bt_node 

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.5
    progress_checker_plugins:
      - progress_checker
    goal_checker_plugins:
      - general_goal_checker
    controller_plugins:
      - FollowPath
    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.05
      movement_time_allowance: 20.0  # Increased: doorway rotation takes longer than 10s
    general_goal_checker:
      stateful: true
      plugin: nav2_controller::SimpleGoalChecker
      xy_goal_tolerance: 0.35
      yaw_goal_tolerance: 3.14
    FollowPath:
      plugin: dwb_core::DWBLocalPlanner
      debug_trajectory_details: false
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.26
      max_vel_y: 0.0
      max_vel_theta: 1.0
      min_speed_xy: 0.0
      max_speed_xy: 0.26      # Synchronized with max_vel_x
      min_speed_theta: 0.0
      acc_lim_x: 0.5           # Smoother acceleration for narrow gaps
      acc_lim_y: 0.0
      acc_lim_theta: 0.8
      decel_lim_x: -2.5
      decel_lim_y: 0.0
      decel_lim_theta: -1.5
      vx_samples: 40
      vtheta_samples: 40
      sim_time: 1.0           # Reduced: 1.5s caused doorway trajectory rejection
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.35
      trans_stopped_velocity: 0.05
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics:
        - RotateToGoal
        - Oscillation
        - BaseObstacle
        - GoalAlign
        - PathAlign
        - PathDist
        - GoalDist
      BaseObstacle.scale: 0.02    # Increased: was 0.01 (near zero), robot ignored wall proximity
      PathAlign.scale: 64.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 10.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0   # Re-enabled: was 0.0, robot now slows and orients at corners
      RotateToGoal.slowing_factor: 2.0
      RotateToGoal.lookahead_time: -1.0
      Oscillation.scale: 10.0
      Oscillation.oscillation_reset_dist: 0.1

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: true
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      robot_radius: 0.20
      plugins:
        - obstacle_layer
        - inflation_layer
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 3.5    # Reduced: softer cost gradient helps DWB find paths near walls
        inflation_radius: 0.22    # Reduced: was 0.35, too wide for doorways with robot_radius 0.20
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      always_send_full_costmap: true
      transform_tolerance: 1.0

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: true
      robot_radius: 0.20
      resolution: 0.05
      track_unknown_space: true
      plugins:
        - static_layer
        - inflation_layer
      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 3.5    # Reduced: matches local costmap
        inflation_radius: 0.22    # Reduced: was 0.35
      always_send_full_costmap: true
      transform_tolerance: 1.0

map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: ''

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: true
    planner_plugins:
      - GridBased
    GridBased:
      plugin: nav2_navfn_planner/NavfnPlanner
      tolerance: 0.25    # Increased: 0.15 too tight, planner failed at doorway corners
      use_astar: false
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins:
      - simple_smoother
    simple_smoother:
      plugin: nav2_smoother::SimpleSmoother
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins:
      - spin
      - backup
      - wait
    spin:
      plugin: nav2_behaviors/Spin
    backup:
      plugin: nav2_behaviors/BackUp
    wait:
      plugin: nav2_behaviors/Wait
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    use_sim_time: true
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.4
    min_rotational_vel: 0.2
    rotational_acc_lim: 1.0

waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20
    # Fix: was true — caused entire followWaypoints task to abort if any
    # intermediate waypoint failed, leaving the robot stranded inside the kitchen
    # before reaching its goal. With false, the follower skips the failed waypoint
    # and continues to the next one.
    stop_on_failure: false
    waypoint_task_executor_plugin: wait_at_waypoint
    wait_at_waypoint:
      plugin: nav2_waypoint_follower::WaitAtWaypoint
      enabled: true
      waypoint_pause_duration: 0

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: OPEN_LOOP
    max_velocity: [0.40, 0.0, 1.5]  # Synchronized with controller
    min_velocity: [0.0,  0.0, -1.5]
    max_accel:    [2.5,  0.0,  3.2]
    max_decel:    [-2.5, 0.0, -3.2]
    odom_topic: odom
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
